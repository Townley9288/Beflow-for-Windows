name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore locked dependencies
        shell: pwsh
        run: dotnet restore BBDown-for-Windows.sln --locked-mode
      - name: Test core
        shell: pwsh
        run: dotnet test BBDown-for-Windows.sln -c Release -p:Platform=x64 --no-restore
      - name: Build WinUI app
        shell: pwsh
        run: dotnet build src\BBDownForWindows.App\BBDownForWindows.App.csproj -c Release -p:Platform=x64 --no-restore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress
      - name: Build release artifacts
        shell: pwsh
        env:
          FFMPEG_ARCHIVE_URL: ${{ vars.FFMPEG_ARCHIVE_URL }}
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          .\scripts\Build-Release.ps1 -Version $version -RequireNativeUpdater
      - uses: actions/upload-artifact@v4
        with:
          name: Beflow-for-Windows-${{ github.ref_name }}
          path: artifacts/release/*
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release/*
          body_path: RELEASE_NOTES.md
